<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              secondary: '#64748b',
              dark: '#0f172a',
              card: '#1e293b',
            }
          }
        }
      }
    </script>
    <style>
      html, body { overflow: hidden !important; height: 100% !important; position: fixed !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
      #root { height: 100% !important; overflow: hidden !important; position: relative; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      /* 强制所有相关容器 */
      .flex-1.flex.flex-col.h-full.bg-slate-50 { overflow: hidden !important; }
      .flex-1.overflow-y-auto.scroll-smooth { overflow-y: auto !important; -webkit-overflow-scrolling: touch; }
      /* 确保头部不被滚动影响 */
      main > header { position: relative; z-index: 30; flex-shrink: 0; }
      /* Custom scrollbar for sidebar */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      /* Simple CSS-only tooltip transition */
      .tooltip-custom { transition: opacity 0.2s, visibility 0.2s; pointer-events: none; }
      /* 禁用所有元素的长按菜单 */
      * { -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; }
      /* 允许输入框可以选中文本 */
      input, textarea { -webkit-user-select: auto !important; user-select: auto !important; }
      /* 禁用图片保存菜单 */
      img { -webkit-touch-callout: none !important; pointer-events: none; }
      a img { pointer-events: none; }
      /* 旋转加载动画 */
      .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(0, 0, 0, 0.1); border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "buffer": "https://aistudiocdn.com/buffer@^6.0.3",
    "jszip": "https://aistudiocdn.com/jszip@^3.10.1"
  }
}
</script>
</head>
  <body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
